<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FRYA - 2FA Verifizierung</title>
  <link rel="stylesheet" href="/ui/static/ui.css?v=p44" />
</head>
<body>
  <main class="content" style="max-width: 420px; margin: 4rem auto;">
    <h1>2FA Verifizierung</h1>
    <p>Bitte gib den Code aus deiner Authenticator-App ein.</p>
    {% if error %}
    <p class="panel-warn">{{ error }}</p>
    {% endif %}
    <form method="post" action="/auth/verify-totp">
      <label>6-stelliger Code (oder Backup-Code)
        <input type="text" name="code" maxlength="8" pattern="[0-9a-f]{6,8}" placeholder="000000" autocomplete="one-time-code" required autofocus />
      </label>
      <button type="submit">Verifizieren</button>
    </form>
    <p style="margin-top:1rem; font-size:0.85em; color:#6b7280;">
      Keinen Zugriff auf deine App? Gib einen Backup-Code ein.
    </p>
  </main>
</body>
</html>
