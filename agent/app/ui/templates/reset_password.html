<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FRYA – Passwort zuruecksetzen</title>
  <link rel="stylesheet" href="/ui/static/ui.css?v=p44" />
</head>
<body>
  <main class="content" style="max-width: 520px; margin: 4rem auto;">
    {% if is_first %}
    <h1>Willkommen bei FRYA</h1>
    <p>Bitte setzen Sie jetzt Ihr Passwort, um Ihren Zugang zu aktivieren.</p>
    {% else %}
    <h1>Passwort zuruecksetzen</h1>
    {% endif %}

    {% if error %}
    <p class="panel-warn">{{ error }}</p>
    {% if not username %}
    <p><a href="/auth/login">&larr; Zum Login</a></p>
    {% endif %}
    {% endif %}

    {% if username %}
    <form method="post" action="/auth/reset-password">
      <input type="hidden" name="token" value="{{ token }}" />
      <label>Neues Passwort <small>(min. 12 Zeichen)</small>
        <input type="password" name="password" autocomplete="new-password" required minlength="12" />
      </label>
      <label>Passwort bestaetigen
        <input type="password" name="password_confirm" autocomplete="new-password" required minlength="12" />
      </label>
      <button type="submit">
        {% if is_first %}Zugang aktivieren{% else %}Passwort speichern{% endif %}
      </button>
    </form>
    {% endif %}
  </main>
</body>
</html>
