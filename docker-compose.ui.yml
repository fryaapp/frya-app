services:
  frya-ui:
    image: nginx:alpine
    volumes:
      - ./ui/dist:/usr/share/nginx/html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frya-ui.rule=Host(`staging.myfrya.de`)"
      - "traefik.http.routers.frya-ui.entrypoints=websecure"
      - "traefik.http.routers.frya-ui.tls=true"
      - "traefik.http.routers.frya-ui.tls.certresolver=le"
      - "traefik.http.routers.frya-ui-http.rule=Host(`staging.myfrya.de`)"
      - "traefik.http.routers.frya-ui-http.entrypoints=web"
      - "traefik.http.routers.frya-ui-http.middlewares=redirect-to-https@file"
      - "traefik.http.services.frya-ui.loadbalancer.server.port=80"
    networks:
      - frya-internal
    restart: unless-stopped

networks:
  frya-internal:
    external: true
